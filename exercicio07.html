<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 08 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .butoes{
            text-align: center;
            background-color: black;
            padding: 40px;
            
        }
        .butao{
            border-style: solid;
            border-width: 2px;
            padding: 10px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif, 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: white;
            text-align: center;
            border-radius: 15px;
            
        }
        .butao:hover{
            border-style: solid;
            border-width: 2px;
            padding: 16px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif, 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: rgb(189, 189, 189);
            text-align: center;
        }
        .cor{
            background-color: gray;
        }

    </style>
</head>
<body class="cor">
    <header>
        <div class="butoes">
            <span class="butao">HOME</span>
            <span class="butao">MENU</span>
            <span class="butao">REDE</span>
            <span class="butao">SHOP</span>
        </div>
    </header>
    <main>

    </main>
    <footer>

    </footer>
</body>
</html>
